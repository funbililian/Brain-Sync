<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results</title>

    <link rel="stylesheet" href="result.css">
    <title>Brain Sync</title>
      <link rel="stylesheet" href="Quiz.css" />
      <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </head>

    <body
      class="bg-[#f7f4eb] min-h-screen flex flex-col items-center p-4 selecAtion:bg-amber-200"
    >
      <header
        class="w-full max-w-md flex items-center justify-between py-4 px-2"
      >
        <div class="flex items-center space-x-6">
          <span class="playfair-heading text-2xl font-bold text-[#d4a317]">
            Brain Sync.
          </span>
</head>
<body>

    <main class="results-page">

        <section class="results-card">

            <h1 class="results-title">
                Quiz Completed 🎉
            </h1>

            <p id="message" class="performance-message">
                Loading...
            </p>

            <div class="score-circle">
                <span id="percentage">0%</span>
            </div>

            <div class="results-details">

                <div class="result-row">
                    <span class="label">Category</span>
                    <span id="category" class="value">
                        -
                    </span>
                </div>

                <div class="result-row">
                    <span class="label">Score</span>
                    <span class="value">
                        <span id="score">0</span> /
                        <span id="total">0</span>
                    </span>
                </div>

                <div class="result-row">
                    <span class="label">
                        Questions Answered
                    </span>
                    <span id="answered" class="value">
                        0
                    </span>
                </div>

            </div>

            <div class="action-buttons">

                <button
                    class="btn primary-btn"
                    onclick="retakeQuiz()"
                >
                    Retake Quiz
                </button>

                <button
                    class="btn secondary-btn"
                    onclick="playAgain()"
                >
                    Choose Another Category
                </button>

            </div>

        </section>

    </main>

    <script src="result.js"></script>

</body>
</html>
